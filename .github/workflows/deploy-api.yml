name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/types/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run types:build

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Run tests
        working-directory: apps/api
        env:
          NODE_ENV: test
        run: npm test

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/medicano-project
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npm run types:build
            npm run build --workspace=apps/api
            pm2 restart medicano-api --update-env
            pm2 restart medicano-api-staging --update-env
            pm2 save